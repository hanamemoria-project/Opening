<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hana Memoria - Perjalanan Kenangan</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #080810; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: white; touch-action: none;
        }
        canvas { display: block; }
        
        #ui-panel {
            position: absolute; top: 20px; right: 20px; width: max-content;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 10px; padding: 15px; border: 1px rgba(255, 255, 255, 0.1) solid;
            z-index: 100;
        }
        .ui-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.6); margin-bottom: 5px; display: block;}
        input[type="color"] { border: none; width: 100px; height: 30px; border-radius: 5px; cursor: pointer; background: none; }

        /* Subtitle Sinematik di Bawah (Versi Optimal Anti-Lag) */
        #subtitle-container {
            position: absolute; bottom: 120px; left: 50%; 
            transform: translate3d(-50%, 0, 0); /* Memaksa render menggunakan GPU */
            text-align: center; z-index: 120; width: 90%; max-width: 500px;
            background: rgba(15, 15, 20, 0.85); /* Solid transparan, bukan blur */
            padding: 12px 20px; border-radius: 30px;
            border: 1px solid rgba(229, 154, 141, 0.3); 
            transition: opacity 0.4s ease, transform 0.4s ease; 
            opacity: 0; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            will-change: opacity, transform; /* Persiapan memori hardware */
        }
        #subtitle-container.show { 
            opacity: 1; 
            transform: translate3d(-50%, -10px, 0); 
        }
        #subtitle-text { color: rgba(255,255,255,0.9); font-size: 14px; letter-spacing: 1px; line-height: 1.5; }
        #subtitle-text span { color: #e59a8d; font-weight: bold; font-size: 16px;}
        
        #branding {
            position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center;
            z-index: 50; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #branding h1 { font-size: 28px; font-weight: 400; letter-spacing: 2px; margin: 0 0 5px 0; font-family: serif; }
        #branding p { font-size: 14px; font-weight: 300; letter-spacing: 1px; margin: 0; opacity: 0.8; }

        #sensor-status {
            position: absolute; top: 20px; left: 20px; font-size: 12px;
            letter-spacing: 1px; padding: 8px 15px; border-radius: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); transition: all 0.3s; z-index: 100;
        }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #080810; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 200; letter-spacing: 2px; z-index: 200; transition: opacity 0.5s; text-align: center;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }

        #message-card {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -40%);
            width: 320px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 30px; text-align: center; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none; transition: all 1s ease-out; z-index: 150;
        }
        #message-card.show { opacity: 1; transform: translate(-50%, -50%); pointer-events: auto; }
        #message-card h3 { margin: 0 0 10px 0; font-family: serif; color: #e59a8d; font-size: 22px; font-weight: 500;}
        #message-card p { margin: 0; font-size: 15px; line-height: 1.6; font-weight: 300; font-style: italic;}
        #message-card .author { margin-top: 15px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;}

        @media (max-width: 600px) {
            #branding h1 { font-size: 22px; }
            #branding p { font-size: 11px; }
            #sensor-status { top: 15px; left: 50%; transform: translateX(-50%); width: max-content;}
            #message-card { width: 80%; padding: 25px; }
            #subtitle-container { bottom: 100px; }
            #ui-panel { top: 60px; right: 50%; transform: translateX(50%); display: flex; gap: 10px; align-items: center; padding: 10px;}
            .ui-label { margin: 0; }
        }
    </style>
</head>
<body>
    <div id="loading">Mempersiapkan Lensa Memori...</div>
    <div id="sensor-status" style="color: #ffaaaa;">Kamera Belum Aktif</div>
    
    <div id="branding">
        <h1>Hana Memoria</h1>
        <p>Mengabadikan cerita dalam setiap bingkai</p>
    </div>

    <div id="message-card">
        <h3>Halo, Kenangan Terindah.</h3>
        <p>"Seperti debu bintang yang melayang, cerita kita akan selalu menemukan jalannya untuk berkumpul, bersemi, dan abadi dalam satu ruang di hati."</p>
        <div class="author">- Hana Memoria</div>
    </div>

    <div id="ui-panel">
        <label class="ui-label">Warna Partikel</label>
        <input type="color" id="color-picker" value="#e59a8d">
    </div>

    <div id="subtitle-container">
        <div id="subtitle-text"></div>
    </div>

    <video id="webcam" autoplay playsinline muted style="display: none;"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float u_time;
        attribute float a_random;
        varying float vRandom;

        void main() {
            vRandom = a_random;
            vec3 pos = position + vec3(
                sin(u_time * (0.5 + a_random) + a_random * 10.0) * (0.05 + a_random * 0.1),
                cos(u_time * (0.4 + a_random) + a_random * 10.0) * (0.05 + a_random * 0.1),
                sin(u_time * (0.3 + a_random) + a_random * 10.0) * (0.05 + a_random * 0.1)
            );
            
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 0.2 * (1.0 + a_random) * (100.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec3 u_color;
        varying float vRandom;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            float alpha = smoothstep(0.5, 0.2, dist);
            if (alpha < 0.05) discard;
            vec3 finalColor = u_color * (0.8 + vRandom * 0.4);
            gl_FragColor = vec4(finalColor, alpha * 0.85); 
        }
    </script>

    <script>
        let scene, camera, renderer, clock;
        let particles, particleMaterial;
        let particleCount = 12000; 
        
        let currentStage = 0; 
        let isAnimating = false; 
        let detectedGesture = null;
        let gestureTimer = 0;

        const statusEl = document.getElementById('sensor-status');
        const subtitleContainer = document.getElementById('subtitle-container');
        const subtitleText = document.getElementById('subtitle-text');

        initThree();
        createParticles();
        initMediaPipe();
        animate();

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6.0; 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);

            document.getElementById('color-picker').addEventListener('input', (e) => {
                if(particleMaterial) particleMaterial.uniforms.u_color.value.set(e.target.value);
            });
        }

        function createParticles() {
            if (particles) scene.remove(particles);
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount);

            generatePattern(positions, 'scatter'); 
            for (let i = 0; i < particleCount; i++) randoms[i] = Math.random();

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('a_random', new THREE.BufferAttribute(randoms, 1));

            particleMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    u_time: { value: 0 },
                    u_color: { value: new THREE.Color(document.getElementById('color-picker').value) }
                },
                transparent: true, depthWrite: false
            });

            particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);
        }

        function generatePattern(positions, pattern) {
            for (let i = 0; i < particleCount; i++) {
                let x = 0, y = 0, z = 0;
                const pIdx = i * 3;
                const rand1 = Math.random();
                const rand2 = Math.random();
                
                switch (pattern) {
                    case 'scatter': 
                        x = (Math.random() - 0.5) * 20; y = (Math.random() - 0.5) * 20; z = (Math.random() - 0.5) * 20;
                        break;
                    case 'singularity': 
                        x = (Math.random() - 0.5) * 0.1; y = (Math.random() - 0.5) * 0.1; z = (Math.random() - 0.5) * 0.1;
                        break;
                    case 'chest': 
                        const pC = Math.random();
                        if (pC < 0.6) {
                            let face = Math.floor(Math.random() * 6);
                            let cx = (Math.random()-0.5)*2.4, cy = (Math.random()-0.5)*1.2 - 0.5, cz = (Math.random()-0.5)*1.6; 
                            if (face===0) { x=1.2; y=cy; z=cz; } else if (face===1) { x=-1.2; y=cy; z=cz; }
                            else if (face===2) { x=cx; y=0.1; z=cz; } else if (face===3) { x=cx; y=-1.1; z=cz; }
                            else if (face===4) { x=cx; y=cy; z=0.8; } else { x=cx; y=cy; z=-0.8; }
                        } else if (pC < 0.95) {
                            let theta = Math.PI * rand1, len = (rand2 - 0.5) * 2.4;
                            x = len; y = 0.1 + 0.8 * Math.sin(theta); z = 0.8 * Math.cos(theta);
                        } else {
                            x = (Math.random()-0.5)*0.3; y = 0.0 + (Math.random()-0.5)*0.3; z = 0.85 + (Math.random()*0.1);
                        }
                        break;
                    case 'chest_open_tulip': 
                        if (Math.random() < 0.3) {
                            let isLid = Math.random() > 0.6;
                            if(!isLid) {
                                let f = Math.floor(Math.random() * 6);
                                let cx = (Math.random()-0.5)*2.4, cy = (Math.random()-0.5)*1.2 - 0.5, cz = (Math.random()-0.5)*1.6; 
                                if (f===0) { x=1.2; y=cy; z=cz; } else if (f===1) { x=-1.2; y=cy; z=cz; }
                                else if (f===2) { x=cx; y=0.1; z=cz; } else if (f===3) { x=cx; y=-1.1; z=cz; }
                                else if (f===4) { x=cx; y=cy; z=0.8; } else { x=cx; y=cy; z=-0.8; }
                            } else {
                                let theta = Math.PI * rand1, len = (rand2 - 0.5) * 2.4;
                                let origY = 0.8 * Math.sin(theta), origZ = 0.8 * Math.cos(theta);
                                let angle = 2.0; 
                                x = len; y = 0.1 + origY * Math.cos(angle) - (origZ+0.8) * Math.sin(angle);
                                z = -0.8 + origY * Math.sin(angle) + (origZ+0.8) * Math.cos(angle);
                            }
                            y -= 2.0; 
                        } else {
                            const part = Math.random();
                            const scaleF = 0.8; 
                            if (part < 0.6) { 
                                const u = rand1, v = rand2 * Math.PI * 2;
                                const rProfile = Math.pow(u, 0.4) * (1.2 - u * 0.4); 
                                const petals = 1.0 + 0.15 * Math.sin(6 * v) * u;
                                const R = rProfile * petals * (0.85 + 0.15 * Math.random()) * scaleF;
                                x = R * Math.cos(v); z = R * Math.sin(v);
                                y = ((u * 1.8) + (Math.abs(Math.sin(3 * v)) * 0.3 * Math.pow(u, 2))) * scaleF; 
                            } else if (part < 0.7) { 
                                const u = rand1, theta = rand2 * Math.PI * 2;
                                y = (-u * 2.8) * scaleF; 
                                const r = (0.04 + Math.random() * 0.04) * scaleF; 
                                x = r * Math.cos(theta) + Math.sin(u * 2.0) * 0.05; z = r * Math.sin(theta);
                            } else { 
                                const u = rand1, v = rand2; 
                                const spineX = Math.pow(u, 1.5) * 1.5 * scaleF;
                                const spineY = (-2.0 + u * 2.5) * scaleF;
                                const spineZ = Math.sin(u * Math.PI) * 0.4 * scaleF; 
                                const leafWidth = Math.sin(u * Math.PI) * 0.5 * (1.0 - u * 0.2) * scaleF;
                                x = spineX + (v - 0.5) * leafWidth * 0.6;
                                y = spineY + Math.sin(v * Math.PI) * 0.15;
                                z = spineZ + (v - 0.5) * leafWidth;
                            }
                            y += 0.5; 
                        }
                        break;
                    case 'heart':
                        const tH = rand2 * Math.PI * 2, rH = Math.sqrt(rand1), scaleH = 0.08;
                        x = rH * 16 * Math.pow(Math.sin(tH), 3) * scaleH;
                        y = rH * (13 * Math.cos(tH) - 5 * Math.cos(2*tH) - 2 * Math.cos(3*tH) - Math.cos(4*tH)) * scaleH;
                        const thickness3D = Math.sqrt(Math.max(0, 1.0 - rH*rH)) * 0.6;
                        z = (Math.random() - 0.5) * thickness3D; 
                        y += 0.2; 
                        break;
                    case 'explode': 
                        x = (Math.random() - 0.5) * 20; y = (Math.random() - 0.5) * 20; z = (Math.random() - 0.5) * 20;
                        break;
                    case 'frame_dynamic': 
                        if (Math.random() < 0.85) { 
                            const wOuter = 1.4, hOuter = 1.8, thick = 0.4, edge = Math.random();
                            if (edge < 0.25) { x = (Math.random()-0.5) * wOuter * 2; y = hOuter - Math.random() * thick; }
                            else if (edge < 0.5) { x = (Math.random()-0.5) * wOuter * 2; y = -hOuter + Math.random() * thick; }
                            else if (edge < 0.75) { x = -wOuter + Math.random() * thick; y = (Math.random()-0.5) * hOuter * 2; }
                            else { x = wOuter - Math.random() * thick; y = (Math.random()-0.5) * hOuter * 2; }
                            z = (Math.random() - 0.5) * 0.2; 
                        } else { 
                            x = (Math.random() - 0.5) * 2.0; y = (Math.random() - 0.5) * 2.8; z = (Math.random() - 0.5) * 0.5;
                        }
                        break;
                    case 'shatter': 
                        x = (Math.random() - 0.5) * 8.0; y = -4.0 - Math.random() * 4.0; z = (Math.random() - 0.5) * 5.0;
                        break;
                    case 'envelope_closed':
                        if (Math.random() < 0.65) { 
                            x = (Math.random()-0.5) * 3.5; y = (Math.random()-0.5) * 2.0 - 0.2; z = (Math.random()-0.5) * 0.1;
                        } else { 
                            let u = rand1, v = rand2; if (u + v > 1) { u = 1 - u; v = 1 - v; } 
                            x = -1.75 + u * 3.5 + v * 1.75; y = 0.8 + u * 0 + v * (-0.8); z = 0.1 + (Math.random()-0.5) * 0.05; 
                        }
                        break;
                    case 'envelope_open':
                        if (Math.random() < 0.65) { 
                            x = (Math.random()-0.5) * 3.5; y = (Math.random()-0.5) * 2.0 - 0.2; z = (Math.random()-0.5) * 0.1;
                        } else { 
                            let u = rand1, v = rand2; if (u + v > 1) { u = 1 - u; v = 1 - v; } 
                            x = -1.75 + u * 3.5 + v * 1.75; y = 0.8 + u * 0 + v * 1.5; z = -0.1 + (Math.random()-0.5) * 0.05; 
                        }
                        break;
                }
                positions[pIdx] = x; positions[pIdx + 1] = y; positions[pIdx + 2] = z;
            }
        }

        function transitionPattern(newPattern, durationSec = 3.0) {
            const positionsAttribute = particles.geometry.attributes.position;
            const currentPositions = positionsAttribute.array;
            const targetPositions = new Float32Array(particleCount * 3);
            generatePattern(targetPositions, newPattern);

            particles.userData.transitioning = true;
            particles.userData.transitionStartTime = clock.elapsedTime;
            particles.userData.transitionDuration = durationSec;
            particles.userData.startPositions = new Float32Array(currentPositions);
            particles.userData.targetPositions = targetPositions;
        }

        function showSubtitle(text) {
            subtitleText.innerHTML = text;
            subtitleContainer.classList.add('show');
        }
        function hideSubtitle() {
            subtitleContainer.classList.remove('show');
        }

        setTimeout(() => {
            if(currentStage === 0) showSubtitle("Tahap 1: <span>Genggam Tangan (✊)</span> untuk menyatukan kenangan.");
        }, 2000);

        function triggerSequenceStep(stepTarget) {
            if (isAnimating) return;
            isAnimating = true;
            statusEl.style.color = "#e59a8d";
            hideSubtitle();

            if (stepTarget === 1) {
                statusEl.innerText = "Mengumpulkan debu...";
                transitionPattern('singularity', 1.0);
                setTimeout(() => {
                    statusEl.innerText = "Membentuk Peti...";
                    transitionPattern('chest', 3.0);
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 1; 
                        statusEl.innerText = "Siap."; 
                        showSubtitle("Tahap 2: <span>Buka Lebar Tangan (✋)</span> untuk membuka peti.");
                    }, 3000); 
                }, 1000);
            } 
            else if (stepTarget === 2) {
                statusEl.innerText = "Membuka Peti...";
                transitionPattern('chest_open_tulip', 3.5);
                setTimeout(() => { 
                    isAnimating = false; currentStage = 2; 
                    statusEl.innerText = "Siap."; 
                    showSubtitle("Tahap 3: Bentuk <span>Dua Jari (✌️)</span> untuk menggugurkan kelopak.");
                }, 3500);
            }
            else if (stepTarget === 3) {
                statusEl.innerText = "Kelopak berguguran...";
                transitionPattern('heart', 4.0);
                setTimeout(() => { 
                    isAnimating = false; currentStage = 3; 
                    statusEl.innerText = "Siap."; 
                    showSubtitle("Tahap 4: Tunjuk <span>Satu Jari (☝️)</span> untuk membingkai cerita.");
                }, 4000);
            }
            else if (stepTarget === 4) {
                statusEl.innerText = "Membesarkan Hati...";
                transitionPattern('explode', 1.0);
                setTimeout(() => {
                    statusEl.innerText = "Membingkai Kenangan...";
                    transitionPattern('frame_dynamic', 3.0);
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 4; 
                        statusEl.innerText = "Siap."; 
                        showSubtitle("Tahap 5: Bentuk <span>Telunjuk & Jempol (👆)</span> untuk menyimpan ke amplop.");
                    }, 3000);
                }, 1000);
            }
            else if (stepTarget === 5) {
                statusEl.innerText = "Memecahkan Bingkai...";
                transitionPattern('shatter', 1.0);
                setTimeout(() => {
                    statusEl.innerText = "Membentuk Amplop...";
                    transitionPattern('envelope_closed', 3.0);
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 5; 
                        statusEl.innerText = "Siap."; 
                        showSubtitle("Tahap Terakhir: Beri <span>Cubitan Cinta (🫰)</span> untuk membaca pesan.");
                    }, 3000);
                }, 1000);
            }
            else if (stepTarget === 6) {
                statusEl.innerText = "Membuka Surat...";
                transitionPattern('envelope_open', 2.5);
                setTimeout(() => {
                    document.getElementById('message-card').classList.add('show');
                    setTimeout(() => { 
                        isAnimating = false; currentStage = 6; 
                        statusEl.innerText = "Selesai."; 
                    }, 3000);
                }, 1500);
            }
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            hands.onResults(onHandResults);

            const mpCamera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            
            mpCamera.start().then(() => {
                document.getElementById('loading').classList.add('fade-out');
                statusEl.innerText = "Menunggu Gestur Pertama...";
                statusEl.style.color = "white";
            });
        }

        function onHandResults(results) {
            if (isAnimating) return; 

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const isIndexOpen = landmarks[8].y < landmarks[6].y;
                const isMiddleOpen = landmarks[12].y < landmarks[10].y;
                const isRingOpen = landmarks[16].y < landmarks[14].y;
                const isPinkyOpen = landmarks[20].y < landmarks[18].y;
                
                const pinchDist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);

                const isFist = !isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen;
                const isOpen = isIndexOpen && isMiddleOpen && isRingOpen && isPinkyOpen;
                const isPeace = isIndexOpen && isMiddleOpen && !isRingOpen && !isPinkyOpen;
                const isIndexOnly = isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen && pinchDist > 0.1;
                
                const isIndexAndThumb = isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen && pinchDist > 0.1;
                
                const isPinch = pinchDist < 0.08 && !isMiddleOpen && !isRingOpen;

                let actionTriggered = false;

                // SISTEM ALUR STATE CERITA
                if (currentStage === 0 && isFist) { triggerSequenceStep(1); actionTriggered = true; }
                else if (currentStage === 1 && isOpen) { triggerSequenceStep(2); actionTriggered = true; }
                else if (currentStage === 2 && isPeace) { triggerSequenceStep(3); actionTriggered = true; }
                else if (currentStage === 3 && isIndexOnly) { triggerSequenceStep(4); actionTriggered = true; }
                else if (currentStage === 4 && isIndexAndThumb) { triggerSequenceStep(5); actionTriggered = true; } 
                else if (currentStage === 5 && isPinch) { triggerSequenceStep(6); actionTriggered = true; } 
                
                if (actionTriggered) {
                    gestureTimer = 0; 
                }

            } else {
                if(!isAnimating && currentStage !== 6) {
                    statusEl.innerText = "Tangan Tidak Terdeteksi";
                    statusEl.style.color = "rgba(255,255,255,0.5)";
                    statusEl.style.borderColor = "rgba(255,255,255,0.2)";
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            if (particleMaterial) particleMaterial.uniforms.u_time.value = elapsedTime;

            if (particles && particles.userData.transitioning) {
                const positionsAttribute = particles.geometry.attributes.position;
                const currentPositions = positionsAttribute.array;
                const { startPositions, targetPositions, transitionStartTime, transitionDuration } = particles.userData;
                
                const transitionProgress = THREE.MathUtils.clamp((elapsedTime - transitionStartTime) / transitionDuration, 0, 1);
                const easedProgress = transitionProgress < .5 ? 4 * transitionProgress * transitionProgress * transitionProgress : (transitionProgress - 1) * (2 * transitionProgress - 2) * (2 * transitionProgress - 2) + 1;

                for (let i = 0; i < currentPositions.length; i++) {
                    currentPositions[i] = THREE.MathUtils.lerp(startPositions[i], targetPositions[i], easedProgress);
                }
                positionsAttribute.needsUpdate = true;
                
                if (transitionProgress >= 1) particles.userData.transitioning = false;
            }

            if (particles && !particles.userData.transitioning) {
                if (currentStage === 1) {
                    particles.rotation.y += 0.02;
                    particles.rotation.x = 0; particles.rotation.z = 0;
                } else if (currentStage === 5) {
                    particles.rotation.y += 0.01;
                    particles.rotation.x = 0; particles.rotation.z = 0;
                } else if (currentStage === 6) {
                    particles.rotation.y = THREE.MathUtils.lerp(particles.rotation.y, 0, 0.05);
                } else {
                    particles.rotation.y = elapsedTime * 0.2;
                    particles.rotation.x = Math.cos(elapsedTime * 0.1) * 0.1;
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
