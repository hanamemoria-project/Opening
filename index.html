<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hana Memoria - Mengabadikan Cerita</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #080810; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: white; touch-action: none;
        }
        canvas { display: block; }
        
        #ui-panel {
            position: absolute; top: 20px; right: 20px; width: 280px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border-radius: 15px; padding: 20px;
            border: 1px rgba(255, 255, 255, 0.1) solid; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 100;
        }

        .gesture-guide {
            font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 15px;
            line-height: 1.6; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }
        .gesture-guide span { font-weight: bold; color: #ffcccc; }

        .ui-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px;}
        .ui-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.6); }
        
        input[type="color"] { border: none; width: 100%; height: 35px; border-radius: 5px; cursor: pointer; background: none; }
        
        #branding {
            position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center;
            z-index: 50; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #branding h1 { font-size: 28px; font-weight: 400; letter-spacing: 2px; margin: 0 0 5px 0; font-family: serif; }
        #branding p { font-size: 14px; font-weight: 300; letter-spacing: 1px; margin: 0; opacity: 0.8; }

        #sensor-status {
            position: absolute; top: 20px; left: 20px; font-size: 12px;
            letter-spacing: 1px; padding: 8px 15px; border-radius: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); transition: all 0.3s; z-index: 100;
        }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #080810; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 200; letter-spacing: 2px; z-index: 200; transition: opacity 0.5s; text-align: center;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }

        @media (max-width: 600px) {
            #ui-panel { top: auto; bottom: 100px; right: 50%; transform: translateX(50%); width: 85%; }
            #branding { bottom: 20px; }
            #branding h1 { font-size: 22px; }
            #branding p { font-size: 11px; }
            #sensor-status { top: 15px; left: 50%; transform: translateX(-50%); width: max-content;}
        }
    </style>
</head>
<body>
    <div id="loading">Mempersiapkan AR Kamera...</div>
    <div id="sensor-status" style="color: #ffaaaa;">Kamera Belum Aktif</div>
    
    <div id="branding">
        <h1>Hana Memoria</h1>
        <p>Mengabadikan cerita dalam setiap bingkai</p>
    </div>

    <div id="ui-panel">
        <div class="gesture-guide">
            <div>✋ Buka Lebar = <span>Bunga Mawar</span></div>
            <div>✊ Kepalkan = <span>Amplop</span></div>
            <div>✌️ Dua Jari = <span>Hati</span></div>
            <div>☝️ Satu Jari = <span>Bingkai</span></div>
        </div>
        <div class="ui-group">
            <div class="ui-label">Warna Partikel</div>
            <input type="color" id="color-picker" value="#e59a8d"> 
        </div>
    </div>

    <video id="webcam" autoplay playsinline muted style="display: none;"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float u_time;
        attribute float a_random;
        varying float vRandom;

        void main() {
            vRandom = a_random;
            vec3 pos = position + vec3(
                sin(u_time * 0.2 + a_random * 10.0) * 0.03,
                cos(u_time * 0.3 + a_random * 10.0) * 0.03,
                sin(u_time * 0.1 + a_random * 10.0) * 0.03
            );
            
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 0.2 * (1.0 + a_random) * (100.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec3 u_color;
        varying float vRandom;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            float alpha = smoothstep(0.5, 0.2, dist);
            if (alpha < 0.05) discard;
            
            vec3 finalColor = u_color * (0.8 + vRandom * 0.4);
            gl_FragColor = vec4(finalColor, alpha * 0.85); 
        }
    </script>

    <script>
        let scene, camera, renderer, clock;
        let particles, particleMaterial;
        
        // Ditingkatkan ke 15.000 agar mawarnya sangat padat dan detail
        let particleCount = 15000; 
        let currentPattern = 'flower'; // Bawaan langsung tampil mawar
        
        let gestureTimer = 0;
        let detectedGesture = null;

        const statusEl = document.getElementById('sensor-status');

        initThree();
        createParticles();
        initMediaPipe();
        animate();

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 4.5; // Sedikit didekatkan

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);

            document.getElementById('color-picker').addEventListener('input', (e) => {
                if(particleMaterial) particleMaterial.uniforms.u_color.value.set(e.target.value);
            });
        }

        function createParticles() {
            if (particles) scene.remove(particles);
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount);

            generatePattern(positions, currentPattern);
            for (let i = 0; i < particleCount; i++) randoms[i] = Math.random();

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('a_random', new THREE.BufferAttribute(randoms, 1));

            particleMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    u_time: { value: 0 },
                    u_color: { value: new THREE.Color(document.getElementById('color-picker').value) }
                },
                transparent: true, 
                depthWrite: false
            });

            particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);
        }

        function generatePattern(positions, pattern) {
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const pIdx = i * 3;
                const rand1 = Math.random();
                const rand2 = Math.random();
                
                switch (pattern) {
                    case 'heart':
                        const tH = rand2 * Math.PI * 2;
                        const rH = Math.sqrt(rand1); 
                        const scaleH = 0.08;
                        x = rH * 16 * Math.pow(Math.sin(tH), 3) * scaleH;
                        y = rH * (13 * Math.cos(tH) - 5 * Math.cos(2*tH) - 2 * Math.cos(3*tH) - Math.cos(4*tH)) * scaleH;
                        z = (Math.random() - 0.5) * 0.2; 
                        y += 0.2; 
                        break;
                        
                    case 'flower':
                        // --- ALGORITMA PHYLLOTAXIS UNTUK MAWAR REALISTIS ---
                        // Memastikan partikel terdistribusi rata dari tengah ke luar
                        const fraction = i / particleCount; 
                        // Sudut Emas (Golden Angle) dalam radian ~137.5 derajat
                        const goldenAngle = 2.39996323; 
                        const thetaF = i * goldenAngle;
                        
                        // Jari-jari melebar ke luar, pangkat 0.6 membuat tengahnya lebih padat
                        let rF = Math.pow(fraction, 0.6) * 1.8; 
                        
                        // Menambahkan gelombang kelopak mawar yang berlapis
                        // (Menciptakan ilusi lipatan kelopak)
                        const petalWave = Math.sin(thetaF * 3.0 + rF * 8.0) * 0.15;
                        rF += petalWave * fraction; // Lipatan lebih kuat di bagian luar
                        
                        x = rF * Math.cos(thetaF);
                        y = rF * Math.sin(thetaF);
                        
                        // Mengatur kedalaman (Sumbu Z) seperti mangkuk mawar sungguhan
                        // Tengahnya tinggi, pinggirannya melengkung ke bawah, lalu bergelombang
                        z = (0.3 - rF * 0.3) + (Math.sin(thetaF * 5.0 - rF * 10.0) * 0.08);
                        
                        // Tambahan noise kecil agar tidak terlalu kaku/seperti debu kosmik
                        x += (Math.random() - 0.5) * 0.02;
                        y += (Math.random() - 0.5) * 0.02;
                        z += (Math.random() - 0.5) * 0.02;
                        break;
                        
                    case 'frame':
                        const wOuter = 1.2, hOuter = 1.6;
                        const thick = 0.5; 
                        const edge = Math.random();
                        
                        if (edge < 0.25) { 
                            x = (Math.random()-0.5) * wOuter * 2;
                            y = hOuter - Math.random() * thick;
                        } else if (edge < 0.5) { 
                            x = (Math.random()-0.5) * wOuter * 2;
                            y = -hOuter + Math.random() * thick;
                        } else if (edge < 0.75) { 
                            x = -wOuter + Math.random() * thick;
                            y = (Math.random()-0.5) * hOuter * 2;
                        } else { 
                            x = wOuter - Math.random() * thick;
                            y = (Math.random()-0.5) * hOuter * 2;
                        }
                        z = (Math.random() - 0.5) * 0.15;
                        break;
                        
                    case 'envelope':
                        const isBody = Math.random();
                        if (isBody < 0.65) { 
                            x = (Math.random()-0.5) * 2.8;
                            y = (Math.random()-0.5) * 1.6 - 0.2; 
                            z = (Math.random()-0.5) * 0.1;
                        } else { 
                            let u = Math.random();
                            let v = Math.random();
                            if (u + v > 1) { u = 1 - u; v = 1 - v; } 
                            
                            const ax = -1.4, ay = 0.6;
                            const bx = 1.4, by = 0.6;
                            const cx = 0.0, cy = -0.3;
                            
                            x = ax + u * (bx - ax) + v * (cx - ax);
                            y = ay + u * (by - ay) + v * (cy - ay);
                            z = 0.05 + (Math.random()-0.5) * 0.05; 
                        }
                        break;
                }
                positions[pIdx] = x; positions[pIdx + 1] = y; positions[pIdx + 2] = z;
            }
        }

        function transitionPattern(newPattern) {
            if (newPattern === currentPattern || (particles && particles.userData.transitioning)) return;
            currentPattern = newPattern;
            
            statusEl.innerText = "Membentuk " + newPattern.toUpperCase();
            
            const positionsAttribute = particles.geometry.attributes.position;
            const currentPositions = positionsAttribute.array;
            const targetPositions = new Float32Array(particleCount * 3);
            generatePattern(targetPositions, newPattern);

            particles.userData.transitioning = true;
            particles.userData.transitionStartTime = clock.elapsedTime;
            particles.userData.startPositions = new Float32Array(currentPositions);
            particles.userData.targetPositions = targetPositions;
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            hands.onResults(onHandResults);

            const mpCamera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            
            mpCamera.start().then(() => {
                document.getElementById('loading').classList.add('fade-out');
                statusEl.innerText = "Menunggu Gestur...";
                statusEl.style.color = "white";
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const isIndexOpen = landmarks[8].y < landmarks[6].y;
                const isMiddleOpen = landmarks[12].y < landmarks[10].y;
                const isRingOpen = landmarks[16].y < landmarks[14].y;
                const isPinkyOpen = landmarks[20].y < landmarks[18].y;

                let newGesture = null;

                if (!isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                    newGesture = 'envelope';
                } else if (isIndexOpen && isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                    newGesture = 'heart';
                } else if (isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                    newGesture = 'frame';
                } else if (isIndexOpen && isMiddleOpen && isRingOpen && isPinkyOpen) {
                    newGesture = 'flower';
                }

                if (newGesture) {
                    if (newGesture === detectedGesture) {
                        gestureTimer++;
                        if (gestureTimer > 15) { 
                            transitionPattern(newGesture);
                            statusEl.style.color = "#aaffaa";
                            statusEl.style.borderColor = "#aaffaa";
                        }
                    } else {
                        detectedGesture = newGesture;
                        gestureTimer = 0;
                    }
                }
            } else {
                statusEl.innerText = "Tangan Tidak Terdeteksi";
                statusEl.style.color = "rgba(255,255,255,0.7)";
                statusEl.style.borderColor = "rgba(255,255,255,0.2)";
                detectedGesture = null;
                gestureTimer = 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            if (particleMaterial) particleMaterial.uniforms.u_time.value = elapsedTime;

            if (particles && particles.userData.transitioning) {
                const positionsAttribute = particles.geometry.attributes.position;
                const currentPositions = positionsAttribute.array;
                const { startPositions, targetPositions, transitionStartTime } = particles.userData;
                
                const transitionProgress = THREE.MathUtils.clamp((elapsedTime - transitionStartTime) / 1.5, 0, 1);
                const easedProgress = transitionProgress < .5 ? 4 * transitionProgress * transitionProgress * transitionProgress : (transitionProgress - 1) * (2 * transitionProgress - 2) * (2 * transitionProgress - 2) + 1;

                for (let i = 0; i < currentPositions.length; i++) {
                    currentPositions[i] = THREE.MathUtils.lerp(startPositions[i], targetPositions[i], easedProgress);
                }
                positionsAttribute.needsUpdate = true;
                
                if (transitionProgress >= 1) particles.userData.transitioning = false;
            }

            if (particles) {
                // Memberikan efek putaran lembut agar kedalaman 3D mawarnya terlihat jelas
                particles.rotation.y = elapsedTime * 0.15;
                particles.rotation.x = Math.cos(elapsedTime * 0.1) * 0.1;
                particles.rotation.z = Math.sin(elapsedTime * 0.05) * 0.05;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
