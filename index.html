<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hana Memoria - Debug Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #080810; font-family: sans-serif; color: white; }
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #080810; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        /* Log Panel untuk cek error di HP */
        #debug-console {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            height: 120px; background: rgba(0,0,0,0.8); font-size: 10px;
            color: #00ff00; overflow-y: scroll; padding: 10px;
            z-index: 2000; border: 1px solid #333; pointer-events: none;
        }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; right: 10px; z-index: 500; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; display:none; }
    </style>
</head>
<body>

    <div id="loading">
        <h2 id="status-text">Memasang Sistem...</h2>
        <p id="sub-status">Menghubungkan ke Server Library</p>
    </div>

    <div id="debug-console">--- SYSTEM LOG ---<br></div>

    <div id="ui">
        <select id="pattern-select">
            <option value="sphere">Bola</option>
            <option value="spiral">Spiral</option>
        </select>
        <input type="color" id="color-picker" value="#ffcccc">
    </div>

    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const logPanel = document.getElementById('debug-console');
        const statusText = document.getElementById('status-text');
        const subStatus = document.getElementById('sub-status');

        function log(msg) {
            console.log(msg);
            logPanel.innerHTML += `> ${msg}<br>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        log("Memulai inisialisasi...");

        // 1. Cek apakah Library terunduh
        if (typeof THREE !== 'undefined') {
            log("Three.js: Berhasil dimuat");
        } else {
            log("ERROR: Three.js gagal dimuat!");
        }

        if (typeof Hands !== 'undefined') {
            log("MediaPipe Hands: Berhasil dimuat");
        } else {
            log("ERROR: MediaPipe gagal dimuat!");
        }

        // --- Three.js Setup ---
        let scene, camera, renderer, particles;
        try {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            log("WebGL: Renderer siap");
        } catch(e) {
            log("ERROR WebGL: " + e.message);
        }

        // --- Particle Creation ---
        function createParticles() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(5000 * 3);
            for(let i=0; i<5000*3; i++) pos[i] = (Math.random()-0.5)*5;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffcccc, size: 0.05, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            log("Particles: 5000 objek dibuat");
        }
        createParticles();

        // --- MediaPipe Hands ---
        async function startSystem() {
            statusText.innerText = "Mengaktifkan Kamera...";
            subStatus.innerText = "Mohon klik 'Allow' jika muncul permintaan izin";
            log("Meminta akses kamera...");

            const videoElement = document.getElementById('webcam');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
            hands.onResults((results) => {
                if (results.multiHandLandmarks.length > 0) {
                    particles.rotation.y += 0.05; // Reaksi sederhana jika tangan terdeteksi
                }
            });

            const mpCamera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });

            mpCamera.start()
                .then(() => {
                    log("KAMERA AKTIF: Sistem berjalan");
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
                })
                .catch((err) => {
                    log("ERROR KAMERA: " + err.name + " - " + err.message);
                    statusText.innerText = "Akses Kamera Gagal";
                    subStatus.innerText = "Cek izin browser Anda.";
                });
        }

        // Jalankan sistem
        window.onload = () => {
            log("Halaman selesai dimuat");
            startSystem();
        };

        function animate() {
            requestAnimationFrame(animate);
            if(particles) particles.rotation.x += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
