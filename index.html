<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hana Memoria - Kenangan yang Hidup</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #080810; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: white; touch-action: none;
        }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 20px; right: 20px; width: 260px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border-radius: 15px; padding: 20px;
            border: 1px rgba(255, 255, 255, 0.1) solid; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 100; display: flex; flex-direction: column; gap: 15px;
            transition: opacity 0.3s;
        }
        #ui.hidden { opacity: 0; pointer-events: none; }

        .ui-group { display: flex; flex-direction: column; gap: 5px; }
        .ui-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.6); }
        
        select, input[type="range"] {
            background: rgba(255, 255, 255, 0.1); border: none; border-radius: 5px;
            color: white; padding: 8px; font-size: 13px; width: 100%; box-sizing: border-box;
        }
        input[type="color"] {
            border: none; width: 100%; height: 35px; border-radius: 5px; cursor: pointer; background: none;
        }
        button#fullscreen-btn {
            background: rgba(255, 255, 255, 0.1); border: none; border-radius: 5px;
            color: white; padding: 10px; font-size: 13px; cursor: pointer; transition: background 0.2s;
        }
        button#fullscreen-btn:hover { background: rgba(255, 255, 255, 0.2); }

        #branding {
            position: absolute; bottom: 30px; left: 30px; right: 30px;
            font-size: 16px; font-weight: 300; letter-spacing: 1px; opacity: 0.7;
            z-index: 50; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #sensor-status {
            position: absolute; top: 20px; left: 20px; font-size: 12px;
            letter-spacing: 1px; padding: 8px 15px; border-radius: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); transition: all 0.3s; z-index: 100;
        }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #080810; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 200; letter-spacing: 2px; z-index: 200; transition: opacity 0.5s; text-align: center;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }

        @media (max-width: 600px) {
            #ui { top: auto; bottom: 80px; right: 50%; transform: translateX(50%); width: 85%; }
            #branding { bottom: 20px; left: 20px; font-size: 14px; text-align: center; }
            #sensor-status { top: 15px; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div id="loading">Memuat Kenangan...</div>
    <div id="sensor-status" style="color: #ffaaaa;">Kamera Belum Aktif</div>
    <div id="branding">Menghidupkan Kenangan dalam Setiap Bingkai</div>

    <div id="ui">
        <div class="ui-group">
            <div class="ui-label">Pola Kenangan</div>
            <select id="pattern-select">
                <option value="sphere">Bola Mewujud</option>
                <option value="spiral">Pusaran Waktu</option>
                <option value="wave">Gelombang Rasa</option>
                <option value="bloom">Mekar Memori</option>
            </select>
        </div>
        <div class="ui-group">
            <div class="ui-label">Warna Perasaan</div>
            <input type="color" id="color-picker" value="#ffcccc">
        </div>
        <div class="ui-group">
            <div class="ui-label">Kepadatan Memori</div>
            <input type="range" id="density-slider" min="1000" max="20000" step="1000" value="10000">
        </div>
        <div class="ui-group">
            <div class="ui-label">Sensitivitas Sentuhan</div>
            <input type="range" id="sensitivity-slider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
        <button id="fullscreen-btn">Layar Penuh</button>
    </div>

    <video id="webcam" autoplay playsinline muted style="display: none;"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script id="bgVertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    </script>
    <script id="bgFragmentShader" type="x-shader/x-fragment">
        varying vec2 vUv; uniform float u_time;
        void main() {
            vec2 p = vUv * 2.0 - 1.0; float r = length(p);
            vec3 col1 = vec3(0.01, 0.01, 0.02); vec3 col2 = vec3(0.03, 0.02, 0.05);
            float mixFactor = 0.5 + 0.5 * sin(u_time * 0.1 + r * 2.0);
            vec3 bgCol = mix(col1, col2, mixFactor) * (1.0 - r * 0.3);
            gl_FragColor = vec4(bgCol, 1.0);
        }
    </script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float u_time;
        uniform float u_interactionFactor;
        uniform float u_pointSize;
        attribute float a_random;
        varying float vRandom;

        void main() {
            vRandom = a_random;
            vec3 pos = position + sin(u_time * 0.5 + a_random * 10.0) * 0.1;
            
            float expansion = mix(0.5, 1.5, u_interactionFactor);
            pos *= expansion;

            pos += vec3(
                sin(u_time * 0.2 + pos.y * 2.0) * 0.1,
                cos(u_time * 0.3 + pos.x * 2.0) * 0.1,
                sin(u_time * 0.4 + pos.z * 2.0) * 0.1
            ) * expansion;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            
            // Ukuran partikel dibuat kecil & responsif terhadap jarak
            gl_PointSize = u_pointSize * (1.0 + a_random) * (100.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec3 u_color;
        varying float vRandom;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            float alpha = smoothstep(0.5, 0.2, dist);
            
            vec3 finalColor = u_color * (0.8 + vRandom * 0.4);
            // Memberikan efek "glow" di tengah partikel
            finalColor += vec3(1.0) * smoothstep(0.2, 0.0, dist) * 0.3;
            
            gl_FragColor = vec4(finalColor, alpha * 0.7);
        }
    </script>

    <script>
        let scene, camera, renderer, clock, bgMesh;
        let particles, particleMaterial;
        let particleCount = 10000;
        let currentPattern = 'sphere';
        let interactionFactor = 0.5;
        let targetInteractionFactor = 0.5;
        let sensitivity = 1.0;
        
        const statusEl = document.getElementById('sensor-status');

        initThree();
        initBackground();
        createParticles();
        initMediaPipe();
        setupUI();
        animate();

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);
        }

        function initBackground() {
            const bgGeometry = new THREE.PlaneGeometry(2, 2);
            const bgMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('bgVertexShader').textContent,
                fragmentShader: document.getElementById('bgFragmentShader').textContent,
                uniforms: { u_time: { value: 0 } },
                depthWrite: false
            });
            bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
            scene.add(bgMesh);
        }

        function createParticles() {
            if (particles) scene.remove(particles);
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount);

            generatePattern(positions, currentPattern);
            for (let i = 0; i < particleCount; i++) randoms[i] = Math.random();

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('a_random', new THREE.BufferAttribute(randoms, 1));

            particleMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    u_time: { value: 0 },
                    u_color: { value: new THREE.Color(document.getElementById('color-picker').value) },
                    u_interactionFactor: { value: interactionFactor },
                    u_pointSize: { value: 1.5 } // Mengecilkan ukuran partikel di sini
                },
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);
        }

        function generatePattern(positions, pattern) {
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const pIdx = i * 3;
                switch (pattern) {
                    case 'sphere':
                        const u = Math.random(), v = Math.random();
                        const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                        x = Math.sin(phi) * Math.cos(theta); y = Math.sin(phi) * Math.sin(theta); z = Math.cos(phi);
                        break;
                    case 'spiral':
                        const angle = i * 0.1, radius = i * 0.0005;
                        x = radius * Math.cos(angle); y = radius * Math.sin(angle); z = (i - particleCount / 2) * 0.0001;
                        break;
                    case 'wave':
                        x = (i / particleCount) * 4 - 2; y = Math.sin(x * 5) * 0.5; z = (Math.random() - 0.5) * 0.5;
                        break;
                    case 'bloom':
                        const t = i / particleCount, a = t * Math.PI * 20, r = t * 1.5;
                        x = r * Math.cos(a) * (1 + 0.2 * Math.sin(a * 5)); y = r * Math.sin(a) * (1 + 0.2 * Math.sin(a * 5)); z = (Math.random() - 0.5) * 0.2;
                        break;
                }
                positions[pIdx] = x; positions[pIdx + 1] = y; positions[pIdx + 2] = z;
            }
        }

        function transitionPattern(newPattern) {
            if (newPattern === currentPattern) return;
            currentPattern = newPattern;
            const positionsAttribute = particles.geometry.attributes.position;
            const currentPositions = positionsAttribute.array;
            const targetPositions = new Float32Array(particleCount * 3);
            generatePattern(targetPositions, newPattern);

            particles.userData.transitioning = true;
            particles.userData.transitionStartTime = clock.elapsedTime;
            particles.userData.startPositions = new Float32Array(currentPositions);
            particles.userData.targetPositions = targetPositions;
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            hands.onResults(onHandResults);

            const mpCamera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            
            mpCamera.start().then(() => {
                document.getElementById('loading').classList.add('fade-out');
                statusEl.innerText = "Mencari Tangan...";
                statusEl.style.color = "white";
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusEl.innerText = "• Tangan Terdeteksi";
                statusEl.style.color = "#aaffaa"; 
                statusEl.style.borderColor = "#aaffaa";

                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const fingerTips = [landmarks[4], landmarks[8], landmarks[12], landmarks[16], landmarks[20]];
                
                let avgDist = 0;
                for(let tip of fingerTips) {
                    avgDist += Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2) + Math.pow(tip.z - wrist.z, 2));
                }
                avgDist /= 5;

                const openThreshold = 0.4;
                const closedThreshold = 0.15;
                targetInteractionFactor = THREE.MathUtils.clamp(((avgDist - closedThreshold) / (openThreshold - closedThreshold)) * sensitivity, 0, 1);
            } else {
                statusEl.innerText = "Mencari Tangan...";
                statusEl.style.color = "rgba(255,255,255,0.7)";
                statusEl.style.borderColor = "rgba(255,255,255,0.2)";
                targetInteractionFactor = 0.5; 
            }
        }

        function setupUI() {
            const ui = document.getElementById('ui');
            document.getElementById('pattern-select').addEventListener('change', (e) => transitionPattern(e.target.value));
            document.getElementById('color-picker').addEventListener('input', (e) => particleMaterial.uniforms.u_color.value.set(e.target.value));
            
            document.getElementById('density-slider').addEventListener('change', (e) => {
                particleCount = parseInt(e.target.value);
                createParticles(); 
            });
            document.getElementById('sensitivity-slider').addEventListener('input', (e) => {
                sensitivity = parseFloat(e.target.value);
            });
            
            document.getElementById('fullscreen-btn').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.getElementById('fullscreen-btn').textContent = "Keluar Layar Penuh";
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        document.getElementById('fullscreen-btn').textContent = "Layar Penuh";
                    }
                }
            });

            let idleTimer;
            function resetIdleTimer() {
                ui.classList.remove('hidden');
                clearTimeout(idleTimer);
                idleTimer = setTimeout(() => ui.classList.add('hidden'), 4000);
            }
            window.addEventListener('touchstart', resetIdleTimer);
            window.addEventListener('mousemove', resetIdleTimer);
            resetIdleTimer();
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            if (particleMaterial) particleMaterial.uniforms.u_time.value = elapsedTime;
            if (bgMesh) bgMesh.material.uniforms.u_time.value = elapsedTime;

            interactionFactor = THREE.MathUtils.lerp(interactionFactor, targetInteractionFactor, 0.08);
            if (particleMaterial) particleMaterial.uniforms.u_interactionFactor.value = interactionFactor;

            if (particles && particles.userData.transitioning) {
                const positionsAttribute = particles.geometry.attributes.position;
                const currentPositions = positionsAttribute.array;
                const { startPositions, targetPositions, transitionStartTime } = particles.userData;
                const transitionProgress = THREE.MathUtils.clamp((clock.elapsedTime - transitionStartTime) / 1.5, 0, 1);
                const easedProgress = transitionProgress < .5 ? 4 * transitionProgress * transitionProgress * transitionProgress : (transitionProgress - 1) * (2 * transitionProgress - 2) * (2 * transitionProgress - 2) + 1;

                for (let i = 0; i < currentPositions.length; i++) {
                    currentPositions[i] = THREE.MathUtils.lerp(startPositions[i], targetPositions[i], easedProgress);
                }
                positionsAttribute.needsUpdate = true;
                if (transitionProgress >= 1) particles.userData.transitioning = false;
            }
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
