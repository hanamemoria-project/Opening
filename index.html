<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hana Memoria - Kenangan yang Hidup</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #080810; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: white; 
            touch-action: none; /* Mencegah scroll tidak sengaja di HP */
        }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px rgba(255, 255, 255, 0.1) solid;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: opacity 0.3s;
        }

        #ui.hidden { opacity: 0; pointer-events: none; }

        .ui-group { display: flex; flex-direction: column; gap: 5px; }
        .ui-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.6); }
        
        select, input[type="range"] {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 5px;
            color: white;
            padding: 8px;
            font-size: 13px;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="color"] {
            border: none;
            width: 100%;
            height: 35px;
            border-radius: 5px;
            cursor: pointer;
            background: none;
        }

        button#fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 5px;
            color: white;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button#fullscreen-btn:hover { background: rgba(255, 255, 255, 0.2); }

        #branding {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.7;
            z-index: 50;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #loading {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #080810;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 200; letter-spacing: 2px;
            z-index: 200;
            transition: opacity 0.5s;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }
        
        #error-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #ffaaaa;
            letter-spacing: 0;
            max-width: 80%;
        }

        @media (max-width: 600px) {
            #ui { top: auto; bottom: 80px; right: 50%; transform: translateX(50%); width: 85%; }
            #branding { bottom: 20px; left: 20px; font-size: 14px; text-align: center; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <span>Memuat Kenangan...</span>
        <div id="error-msg"></div>
    </div>
    <div id="branding">Menghidupkan Kenangan dalam Setiap Bingkai</div>

    <div id="ui">
        <div class="ui-group">
            <div class="ui-label">Pola Kenangan</div>
            <select id="pattern-select">
                <option value="sphere">Bola Mewujud</option>
                <option value="spiral">Pusaran Waktu</option>
                <option value="wave">Gelombang Rasa</option>
                <option value="bloom">Mekar Memori</option>
            </select>
        </div>
        <div class="ui-group">
            <div class="ui-label">Warna Perasaan</div>
            <input type="color" id="color-picker" value="#ffcccc">
        </div>
        <div class="ui-group">
            <div class="ui-label">Kepadatan Memori</div>
            <input type="range" id="density-slider" min="1000" max="15000" step="1000" value="8000">
        </div>
        <div class="ui-group">
            <div class="ui-label">Sensitivitas Sentuhan</div>
            <input type="range" id="sensitivity-slider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
        <button id="fullscreen-btn">Layar Penuh</button>
    </div>

    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float u_time;
        uniform float u_interactionFactor;
        uniform float u_pointSize;
        attribute float a_random;

        varying vec2 vUv;
        varying float vRandom;

        void main() {
            vUv = uv;
            vRandom = a_random;

            vec3 pos = position + sin(u_time * 0.5 + a_random * 10.0) * 0.1;

            float expansion = mix(0.5, 1.5, u_interactionFactor);
            pos *= expansion;

            pos += vec3(
                sin(u_time * 0.2 + pos.y * 2.0) * 0.1,
                cos(u_time * 0.3 + pos.x * 2.0) * 0.1,
                sin(u_time * 0.4 + pos.z * 2.0) * 0.1
            ) * expansion;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            
            gl_PointSize = u_pointSize * (1.0 + a_random) * (100.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec3 u_color;
        varying float vRandom;

        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            float alpha = smoothstep(0.5, 0.2, dist);
            
            vec3 finalColor = u_color * (0.8 + vRandom * 0.4);
            finalColor += vec3(1.0) * smoothstep(0.2, 0.0, dist) * 0.3;

            gl_FragColor = vec4(finalColor, alpha * 0.8);
        }
    </script>
    
    <script id="bgVertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <script id="bgFragmentShader" type="x-shader/x-fragment">
        varying vec2 vUv;
        uniform float u_time;
        void main() {
            vec2 p = vUv * 2.0 - 1.0;
            float r = length(p);
            
            vec3 col1 = vec3(0.01, 0.01, 0.02);
            vec3 col2 = vec3(0.03, 0.02, 0.05);
            
            float mixFactor = 0.5 + 0.5 * sin(u_time * 0.1 + r * 2.0);
            vec3 bgCol = mix(col1, col2, mixFactor);
            bgCol *= 1.0 - r * 0.3;

            gl_FragColor = vec4(bgCol, 1.0);
        }
    </script>

    <script>
        let scene, camera, renderer, clock;
        let particles, particleMaterial, bgMesh;
        let particleCount = 8000; // Dikurangi sedikit untuk optimasi mobile
        let currentPattern = 'sphere';
        let interactionFactor = 0.5;
        let targetInteractionFactor = 0.5;
        let sensitivity = 1.0;

        initThree();
        initBackground();
        createParticles();
        initMediaPipe();
        setupUI();
        animate();

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            // Batasi pixel ratio untuk performa HP agar tidak lag
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize, false);
        }
        
        function initBackground() {
            const bgGeometry = new THREE.PlaneGeometry(2, 2);
            const bgMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('bgVertexShader').textContent,
                fragmentShader: document.getElementById('bgFragmentShader').textContent,
                uniforms: { u_time: { value: 0 } },
                depthWrite: false
            });
            bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
            scene.add(bgMesh);
        }

        function createParticles() {
            if (particles) scene.remove(particles);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount);

            generatePattern(positions, currentPattern);

            for (let i = 0; i < particleCount; i++) {
                randoms[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('a_random', new THREE.BufferAttribute(randoms, 1));

            const colorInput = document.getElementById('color-picker').value;
            
            particleMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    u_time: { value: 0 },
                    u_color: { value: new THREE.Color(colorInput) },
                    u_interactionFactor: { value: interactionFactor },
                    u_pointSize: { value: 3.0 }
                },
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);
        }

        function generatePattern(positions, pattern) {
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const pIdx = i * 3;

                switch (pattern) {
                    case 'sphere':
                        const u = Math.random();
                        const v = Math.random();
                        const theta = 2 * Math.PI * u;
                        const phi = Math.acos(2 * v - 1);
                        x = Math.sin(phi) * Math.cos(theta);
                        y = Math.sin(phi) * Math.sin(theta);
                        z = Math.cos(phi);
                        break;
                    case 'spiral':
                        const angle = i * 0.1;
                        const radius = i * 0.0005;
                        x = radius * Math.cos(angle);
                        y = radius * Math.sin(angle);
                        z = (i - particleCount / 2) * 0.0001;
                        break;
                    case 'wave':
                        x = (i / particleCount) * 4 - 2;
                        y = Math.sin(x * 5) * 0.5;
                        z = (Math.random() - 0.5) * 0.5;
                        break;
                    case 'bloom':
                        const t = i / particleCount;
                        const a = t * Math.PI * 20;
                        const r = t * 1.5;
                        x = r * Math.cos(a) * (1 + 0.2 * Math.sin(a * 5));
                        y = r * Math.sin(a) * (1 + 0.2 * Math.sin(a * 5));
                        z = (Math.random() - 0.5) * 0.2;
                        break;
                }

                positions[pIdx] = x;
                positions[pIdx + 1] = y;
                positions[pIdx + 2] = z;
            }
        }

        function transitionPattern(newPattern) {
            if (newPattern === currentPattern) return;
            currentPattern = newPattern;
            
            const positionsAttribute = particles.geometry.attributes.position;
            const currentPositions = positionsAttribute.array;
            const targetPositions = new Float32Array(particleCount * 3);
            generatePattern(targetPositions, newPattern);

            particles.userData.transitioning = true;
            particles.userData.transitionStartTime = clock.elapsedTime;
            particles.userData.startPositions = new Float32Array(currentPositions);
            particles.userData.targetPositions = targetPositions;
        }

        // --- Penambahan Error Handling MediaPipe ---
        let hands;
        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            const loadingElement = document.getElementById('loading');
            const errorElement = document.getElementById('error-msg');
            
            hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            hands.onResults(onHandResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => await hands.send({image: videoElement}),
                width: 640, height: 480
            });
            
            camera.start().then(() => {
                loadingElement.classList.add('fade-out');
            }).catch((err) => {
                // Tampilkan pesan error jika kamera tidak diizinkan/error di HP
                errorElement.innerHTML = `Gagal mengakses kamera.<br>Pastikan Anda memberikan izin kamera di browser.<br><br>Detail error: ${err.message}`;
                console.error("Camera error:", err);
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const fingerTips = [landmarks[4], landmarks[8], landmarks[12], landmarks[16], landmarks[20]];
                
                let avgDist = 0;
                for(let tip of fingerTips) {
                    const dist = Math.sqrt(
                        Math.pow(tip.x - wrist.x, 2) + 
                        Math.pow(tip.y - wrist.y, 2) + 
                        Math.pow(tip.z - wrist.z, 2)
                    );
                    avgDist += dist;
                }
                avgDist /= 5;

                const openThreshold = 0.4;
                const closedThreshold = 0.2;

                targetInteractionFactor = THREE.MathUtils.clamp(
                    (avgDist - closedThreshold) / (openThreshold - closedThreshold), 
                    0, 1
                ) * sensitivity;
            } else {
                targetInteractionFactor = 0.5;
            }
        }

        function setupUI() {
            const ui = document.getElementById('ui');
            const branding = document.getElementById('branding');

            document.getElementById('pattern-select').addEventListener('change', (e) => {
                transitionPattern(e.target.value);
            });

            document.getElementById('color-picker').addEventListener('input', (e) => {
                particleMaterial.uniforms.u_color.value.set(e.target.value);
            });

            document.getElementById('density-slider').addEventListener('change', (e) => {
                particleCount = parseInt(e.target.value);
                createParticles(); 
            });
            
            document.getElementById('sensitivity-slider').addEventListener('input', (e) => {
                sensitivity = parseFloat(e.target.value);
            });

            document.getElementById('fullscreen-btn').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.getElementById('fullscreen-btn').textContent = "Keluar Layar Penuh";
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        document.getElementById('fullscreen-btn').textContent = "Layar Penuh";
                    }
                }
            });

            let idleTimer;
            function resetIdleTimer() {
                ui.classList.remove('hidden');
                branding.style.opacity = 0.7;
                clearTimeout(idleTimer);
                idleTimer = setTimeout(() => {
                    ui.classList.add('hidden');
                    branding.style.opacity = 0.2;
                }, 4000);
            }
            window.addEventListener('mousemove', resetIdleTimer);
            window.addEventListener('touchstart', resetIdleTimer);
            resetIdleTimer();
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const elapsedTime = clock.getElapsedTime();
            
            if (particleMaterial) particleMaterial.uniforms.u_time.value = elapsedTime;
            if (bgMesh) bgMesh.material.uniforms.u_time.value = elapsedTime;

            interactionFactor = THREE.MathUtils.lerp(interactionFactor, targetInteractionFactor, 0.1);
            if (particleMaterial) particleMaterial.uniforms.u_interactionFactor.value = interactionFactor;

            if (particles && particles.userData.transitioning) {
                const positionsAttribute = particles.geometry.attributes.position;
                const currentPositions = positionsAttribute.array;
                const { startPositions, targetPositions, transitionStartTime } = particles.userData;
                
                const duration = 1.5; 
                const transitionProgress = THREE.MathUtils.clamp((clock.elapsedTime - transitionStartTime) / duration, 0, 1);
                
                const ease = t => t<.5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2)+1;
                const easedProgress = ease(transitionProgress);

                for (let i = 0; i < currentPositions.length; i++) {
                    currentPositions[i] = THREE.MathUtils.lerp(startPositions[i], targetPositions[i], easedProgress);
                }
                positionsAttribute.needsUpdate = true;

                if (transitionProgress >= 1) {
                    particles.userData.transitioning = false;
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
